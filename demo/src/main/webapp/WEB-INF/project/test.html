<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>모닥모닥 캠핑 렌탈</title>

<link rel="stylesheet" href="common.css">

<style>

/* 데모용 간단 추가 스타일 */
.demo-section{
    margin-top:40px;
}

h2{
    margin-bottom:20px;
}

</style>

</head>

<body>

<header>
<div class="container header-inner">

<div class="logo">🔥 모닥모닥</div>

<div class="nav">
<a href="#">대여</a>
<a href="#">구매</a>
<a href="#">캠핑장</a>
<a href="#">커뮤니티</a>
<a href="#">마이페이지</a>
</div>

</div>
</header>


<div class="container">

<!-- 검색 -->
<div class="demo-section">

<h2>검색</h2>

<div class="search-box">
<input type="text" placeholder="캠핑용품 검색">
<button>검색</button>
</div>

</div>


<!-- 카테고리 -->
<div class="demo-section">

<h2>카테고리</h2>

<div class="category">
<button>텐트</button>
<button>의자</button>
<button>테이블</button>
<button>버너</button>
<button>랜턴</button>
</div>

</div>


<!-- 상품 리스트 -->
<div class="demo-section">

<h2>상품 리스트</h2>

<div class="product-grid">

<div class="card">
<img class="product-img" src="https://picsum.photos/300/200">
<div class="product-title">캠핑 텐트</div>
<div class="price">₩15,000 / 하루</div>
<button class="btn btn-primary">대여하기</button>
</div>

<div class="card">
<img class="product-img" src="https://picsum.photos/300/201">
<div class="product-title">캠핑 의자</div>
<div class="price">₩5,000 / 하루</div>
<button class="btn btn-primary">대여하기</button>
</div>

<div class="card">
<img class="product-img" src="https://picsum.photos/300/202">
<div class="product-title">캠핑 테이블</div>
<div class="price">₩7,000 / 하루</div>
<button class="btn btn-primary">대여하기</button>
</div>

<div class="card">
<img class="product-img" src="https://picsum.photos/300/203">
<div class="product-title">캠핑 랜턴</div>
<div class="price">₩3,000 / 하루</div>
<button class="btn btn-primary">대여하기</button>
</div>

</div>

</div>


<!-- 테이블 예시 -->
<div class="demo-section">

<h2>주문 목록 테이블</h2>

<table>

<tr>
<th>주문번호</th>
<th>상품</th>
<th>대여기간</th>
<th>상태</th>
</tr>

<tr>
<td>1001</td>
<td>캠핑 텐트</td>
<td>3/20 ~ 3/22</td>
<td>대여중</td>
</tr>

<tr>
<td>1002</td>
<td>캠핑 의자</td>
<td>3/25 ~ 3/26</td>
<td>반납완료</td>
</tr>

</table>

</div>

</div>


<footer>

<p>© 모닥모닥 캠핑 렌탈</p>
<p>캠핑 장비 대여 · 캠핑 정보 · 커뮤니티</p>

</footer>


</body>
</html>
